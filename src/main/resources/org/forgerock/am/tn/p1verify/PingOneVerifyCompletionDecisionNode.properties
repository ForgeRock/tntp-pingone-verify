nodeDescription=PingOne Verify Completion Decision
nodeHelp=The PingOne Verify Completion Decision node determines the outcome of the end user's identity \
  verification on the PingOne platform. <br><br>\
  This node retrieves the most recent PingOne Verify Transaction for the user and evaluates its status. \
  Based on the transaction state, the node returns one of five outcomes: Success, Failure, Expired, \
  Not Started, or Not Completed.

tntpPingOneConfigName=PingOne Service
tntpPingOneConfigName.help=Service for PingOne, PingOne Verify, PingOne Protect *, and PingOne DaVinci API.

captureFailure=Capture failure
captureFailure.help=If selected, a failure is captured in shared state under a key \
  named <code>pingOneVerifyCompletionFailureReason</code> for use by subsequent nodes in the journey.

# Outcomes
successOutcome=Success
failureOutcome=Failure
expiredOutcome=Expired
notStartedOutcome=Not Started
notCompletedOutcome=Not Completed
